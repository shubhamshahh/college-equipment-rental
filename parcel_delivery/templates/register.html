{% extends "base.html" %}
{% block title %}Sign Up - CampusParcel{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-3 text-center">Create Account</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">I want to register as:</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="role" id="role_sender" value="sender" checked>
                            <label class="btn btn-outline-primary" for="role_sender"><i class="bi bi-send"></i> Sender</label>

                            <input type="radio" class="btn-check" name="role" id="role_rider" value="rider">
                            <label class="btn btn-outline-success" for="role_rider"><i class="bi bi-bicycle"></i> Rider</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">College Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div id="riderFields" style="display:none;">
                        <hr>
                        <h6>Rider Details</h6>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Vehicle Type</label>
                                <select name="vehicle_type" class="form-select">
                                    <option value="bike">Bike</option>
                                    <option value="bicycle">Bicycle</option>
                                    <option value="on_foot">On Foot</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Vehicle Number (if any)</label>
                                <input type="text" name="vehicle_number" class="form-control" placeholder="e.g. GJ-01-AB-1234">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Already have an account? <a href="{{ url_for('login') }}">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
const roleRadios = document.querySelectorAll('input[name="role"]');
const riderFields = document.getElementById('riderFields');
function toggleRiderFields() {
    const selected = document.querySelector('input[name="role"]:checked').value;
    riderFields.style.display = (selected === 'rider') ? 'block' : 'none';
}
roleRadios.forEach(r => r.addEventListener('change', toggleRiderFields));
toggleRiderFields();
</script>
{% endblock %}
